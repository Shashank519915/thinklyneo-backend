name: Publish @shashank519915/shared

# Fires only when you push a tag like: shared-v1.2.3
# To release: git tag shared-v1.0.1 && git push origin shared-v1.0.1
on:
  push:
    tags:
      - "shared-v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # needed to push to GitHub Packages

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@shashank519915"

      # Use --no-frozen-lockfile because the lockfile workspace link is an internal
      # file: reference — it does not need to be resolved from the registry.
      - run: pnpm install --no-frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Build dist/ fresh before publishing
      - name: Build shared package
        working-directory: shared
        run: pnpm build

      # cd into the package directory and publish directly — more reliable than --filter
      - name: Publish to GitHub Packages
        working-directory: shared
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
